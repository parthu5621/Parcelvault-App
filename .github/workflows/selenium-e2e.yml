name: ParcelVault — Selenium E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:           # Manual trigger from GitHub UI

permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  selenium-e2e:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            selenium-tests/package-lock.json

      # ── Frontend Build ─────────────────────────────────────────────────────
      - name: Install web app dependencies
        run: npm install

      - name: Build web application
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3001/api

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Seed database & start backend server
        run: |
          npm run seed
          npm start &
          echo "Waiting for backend to start..."
          for i in {1..20}; do
            if curl -sf http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Backend is up!"
              break
            fi
            echo "Attempt $i/20 — waiting 3s..."
            sleep 3
          done
          curl --fail --silent http://localhost:3001/api/health \
            || (echo "ERROR: Backend did not start in time" && exit 1)
        working-directory: ./backend
        env:
          PORT: 3001
          JWT_SECRET: parcelvault_super_secret_key_2026
          JWT_EXPIRES_IN: 7d
          DB_PATH: ./src/db/parcelvault.db
          NODE_ENV: development
          # node:sqlite is experimental in Node 22.x — this flag enables it
          NODE_OPTIONS: --experimental-sqlite

      # ── Dev Server ───────────────────────────────────────────────────────────
      - name: Start Vite dev server in background
        run: |
          npm run dev &
          echo "Waiting for Vite to start..."
          for i in {1..20}; do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Vite dev server is up!"
              break
            fi
            echo "Attempt $i/20 — waiting 3s..."
            sleep 3
          done
          curl --fail --silent http://localhost:5173 \
            || (echo "ERROR: Vite dev server did not start in time" && exit 1)

      # ── Selenium Tests ───────────────────────────────────────────────────────
      - name: Install Selenium test dependencies
        run: npm install
        working-directory: ./selenium-tests

      - name: Setup Chrome for Selenium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Create test-results directory
        run: |
          mkdir -p selenium-tests/test-results
          mkdir -p android-tests/test-results

      - name: Run Selenium E2E Tests (Headless)
        # continue-on-error so artifacts always upload even if tests fail
        continue-on-error: true
        run: HEADLESS=true npm run test:all
        working-directory: ./selenium-tests
        env:
          BASE_URL: http://localhost:5173

      - name: Generate Unified QA Test Reports
        if: always()
        run: node selenium-tests/generate-reports.js

      # ── Artifacts & Reports ──────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qa-automation-test-results
          path: |
            selenium-tests/test-results/
            android-tests/test-results/
          retention-days: 7

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Automated QA Suite Results
          path: |
            selenium-tests/test-results/*.xml
            android-tests/test-results/*.xml
          # 'java-junit' is the correct reporter for JUnit XML (mocha-junit-reporter output)
          reporter: java-junit
          fail-on-error: false

