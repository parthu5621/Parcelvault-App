name: ParcelVault — Selenium E2E Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]
  workflow_dispatch:           # Manual trigger from GitHub UI

permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  selenium-e2e:
    name: Run Selenium E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            selenium-tests/package-lock.json

      # ── Frontend Build ─────────────────────────────────────────────────────
      - name: Install web app dependencies
        run: npm install
        working-directory: .

      - name: Build web application
        run: npm run build
        working-directory: .
        env:
          # Override to use relative API path during CI (backend runs on localhost)
          VITE_API_URL: http://localhost:3001/api

      # ── Backend ─────────────────────────────────────────────────────────────
      - name: Install backend dependencies
        run: npm install
        working-directory: ./backend

      - name: Seed database & start backend server
        run: |
          npm run seed
          npm start &
          echo "Waiting for backend to start..."
          for i in {1..15}; do
            curl -s http://localhost:3001/api/health && break || sleep 2
          done
          curl --fail http://localhost:3001/api/health || (echo "Backend did not start in time" && exit 1)
        working-directory: ./backend

      # ── Dev Server ───────────────────────────────────────────────────────────
      - name: Start Vite dev server in background
        run: |
          npm run dev &
          echo "Waiting for Vite to start..."
          for i in {1..15}; do
            curl -s http://localhost:5173 && break || sleep 2
          done
          curl --fail http://localhost:5173 || (echo "Vite dev server did not start in time" && exit 1)
        working-directory: .

      # ── Selenium Tests ───────────────────────────────────────────────────────
      - name: Install Selenium test dependencies
        run: npm install
        working-directory: ./selenium-tests

      - name: Setup Chrome for Selenium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Create test-results directory
        run: mkdir -p selenium-tests/test-results

      - name: Run Selenium E2E Tests (Headless)
        run: HEADLESS=true npm run test:all
        working-directory: ./selenium-tests
        env:
          BASE_URL: http://localhost:5173

      # ── Artifacts & Reports ──────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-results
          path: selenium-tests/test-results/
          retention-days: 7

      - name: Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Selenium E2E Test Results
          path: selenium-tests/test-results/*.xml
          reporter: mocha-junit
          fail-on-error: false
